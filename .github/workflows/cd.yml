name: CD - Labo 05

on:
  push:
    branches: [ main ]

jobs:
  deploy-labo05:
    runs-on: self-hosted

    steps:
      - name: Create Docker network
        run: docker network create labo05-network || true

      - name: Update payment repository
        run: |
          cd ~/labo5/log430-labo5-payment
          git pull origin main

      - name: Create payment .env
        run: |
          cd ~/labo5/log430-labo5-payment
          cat > .env << EOF
          DB_HOST=mysql_payments
          DB_PORT=3306
          DB_USER=labo05
          DB_PASSWORD=labo05
          DB_NAME=labo05_payments_db
          FLASK_APP=src/payments_api.py
          FLASK_ENV=production
          PYTHONUNBUFFERED=1
          EOF

      - name: Deploy payment service
        run: |
          cd ~/labo5/log430-labo5-payment
          docker compose down
          docker compose up -d --build

      - name: Update store manager repository
        run: |
          cd ~/labo5/log430-labo5
          git pull origin main

      - name: Create store manager .env
        run: |
          cd ~/labo5/log430-labo5
          cat > .env << EOF
          DB_HOST=mysql
          DB_PORT=3306
          DB_USER=labo05
          DB_PASSWORD=labo05
          DB_NAME=labo05_db
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_DB=0
          KAFKA_HOST=labo7-seulement!
          FLASK_APP=src/store_manager.py
          FLASK_ENV=production
          PYTHONUNBUFFERED=1
          EOF

      - name: Deploy store manager
        run: |
          cd ~/labo5/log430-labo5
          docker compose down
          docker compose up -d --build

      - name: Wait for Store Manager health check
        run: |
          for i in {1..30}; do
            echo "Attempt $i: checking Store Manager..."
            if curl --fail http://localhost:5000/health-check; then
              echo "Store Manager is ready"
              exit 0
            fi
            sleep 2
          done

          echo "Store Manager did not become ready in time"
          cd ~/labo5/log430-labo5
          docker compose ps
          docker compose logs store_manager
          docker compose logs mysql
          exit 1

      - name: Show containers
        run: |
          cd ~/labo5/log430-labo5-payment
          docker compose ps
          cd ~/labo5/log430-labo5
          docker compose ps