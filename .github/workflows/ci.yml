name: CI - Labo 05 Store Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-tests-store-manager:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Store Manager
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          DB_HOST=mysql
          DB_PORT=3306
          DB_USER=labo05
          DB_PASSWORD=labo05
          DB_NAME=labo05_db
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_DB=0
          KAFKA_HOST=labo7-seulement!
          EOF

      - name: Create Docker network
        run: docker network create labo05-network || true

      - name: Build containers
        run: docker compose build

      - name: Start containers
        run: docker compose up -d mysql redis store_manager

      - name: Show containers
        run: docker compose ps

      - name: Test health check
        run: curl --fail http://localhost:5000/health-check

      - name: Run smoke tests
        run: docker compose exec -T store_manager pytest -s -vv

      - name: Stop containers
        if: always()
        run: docker compose down